<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>ROV 海洋探索與淨海任務</title>

  <meta property="og:title" content="ROV 海洋探索與淨海任務">
  <meta property="og:description" content="認識海洋垃圾、ROV水下無人載具，以及淨海任務的學習網站。">

  <style>
    body {
      margin: 0;
      font-family: "Microsoft JhengHei", Arial, sans-serif;
      background: linear-gradient(#0077b6, #003049);
      min-height: 100vh;
      color: #222;
    }

    .wrap {
      max-width: 900px;
      margin: 40px auto;
      background: white;
      border-radius: 14px;
      padding: 35px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    }

    h1 {
      text-align: center;
      color: #005f73;
      margin-bottom: 10px;
    }

    .subtitle {
      text-align: center;
      color: #555;
      line-height: 1.8;
      margin-bottom: 30px;
    }

    .cards {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .card {
      flex: 1;
      min-width: 260px;
      border: 2px solid #90caf9;
      background: #f4fbff;
      border-radius: 10px;
      padding: 22px;
    }

    .card h2 {
      color: #0077b6;
      font-size: 22px;
    }

    .card p {
      line-height: 1.8;
      font-size: 16px;
    }

    .mission {
      margin-top: 30px;
      padding: 22px;
      border-radius: 10px;
      background: #e0f7fa;
      line-height: 1.8;
    }

    footer {
      margin-top: 30px;
      text-align: center;
      color: #777;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>ROV 海洋探索與淨海任務</h1>

    <div class="subtitle">
      透過海洋科技工具，認識海洋垃圾、學習水下探索，<br>
      並思考我們可以如何一起守護海洋環境。
    </div>

    <div class="cards">
      <div class="card">
        <h2>什麼是海洋垃圾？</h2>
        <p>
          海洋垃圾包含塑膠袋、寶特瓶、漁網、吸管等人類丟棄物。
          這些垃圾可能傷害海洋生物，也會破壞海洋生態。
        </p>
      </div>

      <div class="card">
        <h2>什麼是 ROV？</h2>
        <p>
          ROV 是水下無人載具，可以透過遙控方式進入水中，
          幫助我們觀察海底、拍攝影像，甚至協助完成淨海任務。
        </p>
      </div>
    </div>

    <div class="mission">
      <strong>學習任務：</strong><br>
      請觀察生活中可能進入海洋的垃圾，思考它們從哪裡來，
      又會對海洋生物造成什麼影響。接著設計一個 ROV 淨海任務，
      說明你會如何發現、分類與清除海洋垃圾。
    </div>

    <footer>
      © 2026 ROV 海洋探索學習網站
    </footer>
  </div>
</body>
</html>
