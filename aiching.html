<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>基隆海底環保 ROV 學習網</title>
    <style>
        /* =======================================
           CSS 區塊：網頁的外觀與排版（卡通風格）
           ======================================= */
        
        body {
            margin: 0;
            padding: 0;
            /* 漂亮的海洋深處漸層色 */
            background-image: linear-gradient(to bottom, #1ebbd7 0%, #0c6a9c 80%, #d4c391 100%);
            background-attachment: fixed; /* 讓背景固定，不隨捲軸移動 */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: '微軟正黑體', sans-serif;
            color: #ffffff;
        }

        .container {
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background-color: rgba(255, 255, 255, 0.15);
            border-radius: 15px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
        }

        p {
            font-size: 1.2rem;
            line-height: 1.6;
        }

        .card {
            background: white;
            color: #333;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome to ROV 學習網 🌊</h1>
        <p>探索基隆美麗的海底世界，一起透過水下無人載具（ROV）守護海洋環境！</p>
        
        <div class="card">
            <h3>🤖 什麼是 ROV？</h3>
            <p>ROV（Remotely Operated Vehicle）是遙控水下無人載具，科學家與環保團隊可以用它來清理海底垃圾、監測珊瑚礁生態，代替人類潛入深海完成艱難的任務。</p>
        </div>
    </div>

</body>
</html>
